    <script>
        const questionsData = [
            { id: 1, text: "1. Conforme al artículo 3.16 del Reglamento (UE) No 910/2014 del Parlamento Europeo y del Consejo de 23 de julio de 2014 relativo a la identificación electrónica y los servicios de confianza para las transacciones electrónicas en el mercado interior y por la que se deroga la Directiva 1999/93/CE, ¿cuál de los siguientes NO es un servicio electrónico de confianza?", options: ["a) La creación, verificación y validación de certificados para la autenticación de dispositivos optoelectrónicos.", "b) La creación, verificación y validación de firmas electrónicas, sellos electrónicos o sellos de tiempo electrónicos, servicios de entrega electrónica certificada y certificados relativos a estos servicios.", "c) La creación, verificación y validación de certificados para la autenticación de sitios web.", "d) La preservación de firmas, sellos o certificados electrónicos relativos a estos servicios.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 2, text: "2. ¿Qué artículo de la Constitución Española de 1978 protege el derecho fundamental a la protección de datos personales?", options: ["a) Artículo 14", "b) Artículo 18.4", "c) Artículo 20", "d) Artículo 31", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 3, text: "3. ¿Cuál de los siguientes es un derecho digital de los contemplados en el Titulo X de la Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales?", options: ["a) Derecho al olvido.", "b) Derecho a la desconexión analógica en el ámbito laboral.", "c) Derecho a la desconexión digital en todos los ámbitos.", "d) Derecho a la intimidad y uso de dispositivos digitales en el ámbito laboral.", "e) Dejar en blanco."], correctIndex: 3 },
            { id: 4, text: "4. La guía desarrollada por el Centro Criptológico Nacional para la 'Declaración, Certificación y Aprobación Provisional de conformidad con el ENS y Distintivos de cumplimiento' es:", options: ["a) CCN-STIC-809", "b) CCN-STIC-825", "c) CCN-STIC-817", "d) CCN-STIC-801", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 5, text: "5. Conforme al artículo 5.1 de la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, ¿cuál de las siguientes opciones NO constituye uno de los principios generales de la publicidad activa al amparo de lo recogido en la mencionada ley?", options: ["a) Los sujetos enumerados en el ámbito subjetivo de aplicación de esta ley publicarán de forma periódica y actualizada la información cuyo conocimiento sea relevante para garantizar la transparencia de su actividad relacionada con el funcionamiento y control de la actuación pública.", "b) El cumplimiento de las obligaciones de transparencia contenidas en este capítulo eximen del acatamiento de cualquier otra prescripción emanada de la normativa autonómica correspondiente o de cualquier otra disposición específica, aunque prevea un régimen más amplio en materia de publicidad.", "c) La información sujeta a las obligaciones de transparencia será publicada en las correspondientes sedes electrónicas o páginas web y de una manera clara, estructurada y entendible para los interesados y, preferiblemente, en formatos reutilizables.", "d) Toda la información será comprensible, de acceso fácil y gratuito y estará a disposición de las personas con discapacidad en una modalidad suministrada por medios o en formatos adecuados de manera que resulten accesibles y comprensibles, conforme al principio de accesibilidad universal y diseño para todos.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 6, text: "6. ¿Cómo contribuye la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno a la implementación de los Objetivos de Desarrollo Sostenible (ODS) de la Agenda 2030?", options: ["a) Promoviendo la transparencia y la rendición de cuentas en la gestión pública.", "b) Limitando el acceso a la información sólo a los funcionarios públicos.", "c) Impidiendo la publicación de información sobre políticas públicas..", "d) Reforzando el secretismo en la administración pública.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 7, text: "7. En virtud del artículo 20 de la Ley 4/2023, de 28 de febrero, para la igualdad real y efectiva de las personas trans y para la garantía de los derechos de las personas LGTBI, seleccione la opción INCORRECTA:", options: ["a) Las administraciones educativas competentes y las universidades impulsarán la introducción, en los planes de estudio conducentes a la obtención de los títulos universitarios y de formación profesional oficiales que habilitan para el ejercicio de profesiones docentes, sanitarias y jurídicas, de contenidos dirigidos a la capacitación necesaria para abordar la diversidad sexual, de género y familiar.", "b) El Gobierno, en el ejercicio de sus potestades y sin necesidad de consulta previa a las comunidades autónomas, podrá incluir contenidos relativos al tratamiento de la diversidad sexual, de género y familiar de las personas LGTBI como uno de los aspectos que podrá ser tratado de manera específica en las pruebas que se realicen en los procedimientos selectivos de ingreso, acceso y adquisición de nuevas especialidades correspondientes a los cuerpos docentes establecidos en la normativa vigente.", "c) Las administraciones educativas competentes y las universidades promoverán la formación, docencia e investigación en diversidad sexual, de género y familiar, y promoverán grupos de investigación especializados en la realidad del colectivo LGTBI y sobre las necesidades específicas de las personas con VIH.", "d) El Gobierno incluirá entre los aspectos básicos del currículo de las distintas etapas educativas, el principio de igualdad de trato y no discriminación por las causas previstas en esta ley y el conocimiento y respeto de la diversidad sexual, de género y familiar de las personas LGTBI.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 8, text: "8. ¿Cuál de las siguientes opciones NO es uno de los Ejes de Actuación recogidos en el Pacto de Estado contra la Violencia de Género?", options: ["a) El impulso de la formación de los distintos agentes para garantizar la mejor respuesta asistencial.", "b) La mejora de las oportunidades de empleo en las zonas rurales, disminuyendo la exclusión social, incrementando la igualdad entre mujeres y hombres y las oportunidades para jóvenes, consolidando la resiliencia comunitaria.", "c) La mejora de la respuesta institucional a través de la coordinación y el trabajo en red.", "d) La visualización y atención de otras formas de violencia contra las mujeres, prestando especial atención a la violencia sexual, a la trata de mujeres y niñas con fines de explotación sexual, a la mutilación genital femenina y a los matrimonios forzados.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 9, text: "9. ¿Cuál de los siguientes es un servicio declarado como servicio compartido por la Comisión de Estrategia TIC?", options: ["a) Servicio de intercambio de información entre las administración públicas.", "b) Servicio Integrado de Gestión de Personal (SIGP), para gestión de todos los procedimientos relacionados con Recursos Humanos de la Administración.", "c) Servicio de gestión de sedes electrónicas para implementar la tramitación de expedientes administrativos para todo el Sector Público Administrativo.", "d) Servicio de traducción automática para la integración con los portales web de las Administraciones Públicas.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 10, text: "10. ¿Cuáles de los siguientes corresponden a utilidades para portales y servicios públicos ofrecidos en el Catálogo de Servicios de Administración Digital de la Secretaría General de Administración Digital (SGAD)?", options: ["a) PLATA, EGEO, OAG.", "b) PLATA, EGEO, OAW.", "c) FORMA, EGEO, OAW.", "d) PLATA, FORMA, OAW.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 11, text: "11. ¿Qué clase de escalabilidad aplicamos cuando ampliamos memoria en el disco duro de un ordenador sobremesa?", options: ["a) Escalabilidad horizontal.", "b) Escalabilidad en carga.", "c) Escalabilidad vertical.", "d) Escalabilidad de redundancia.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 12, text: "12. El National Institute of Standards and Technology (NIST) establece una definición de computación en la nube (cloud computing) que está formada por cinco características esenciales, tres modelos de servicio y cuatro modelos de implementación. Los tres modelos de servicio son:", options: ["a) MaaS (Modelling as a Service); SaaS (Software as a Service) y PasS (Platform as a Service).", "b) laaS (Infrastructure as a Service); SaaS (Software as a Service) y PaaS (Platform as a Service).", "c) KaaS (Kernel as a Service); MaaS (Modelling as a Service) e laaS (Infrastructure as a Service.", "d) SaaS (Software as a Service; MaaS (Modelling as a Service) y KaaS (Kernel as a Service).", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 13, text: "13. En relación con SaaS (Software as a Service), seleccione la respuesta INCORRECTA:", options: ["a) Una modalidad en la que se ofrece todo lo necesario para soportar la puesta en producción de aplicaciones y servicios web, así como el ciclo de vida completo de su desarrollo, construcción, ensayo y preproducción.", "b) Una modalidad de distribución y contratación de software donde un proveedor proporciona la operación, soporte y mantenimiento de una aplicación software que usará el cliente durante el tiempo que haya contratado el servicio.", "c) Un servicio situado en la capa más alta de la Pirámide de la Nube. Permite abstraer al usuario de todos los niveles de infraestructura inferiores.", "d) Un servicio software en el que el cliente se encarga de manejar dicho software independientemente de los recursos que se necesiten. Es un método de distribución de software accesible por la red.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 14, text: "14. En la administración de servidores Windows, ¿qué son las directivas de seguridad?", options: ["a) Herramientas de gestión de los privilegios de seguridad a nivel de dominio, de controlador de dominio y local.", "b) Herramientas de resolución de nombres Windows, también llamadas DNS.", "c) Herramientas que sirven para configurar el acceso a los recursos compartidos, también llamadas DFS, sistemas distribuidos de seguridad.", "d) Herramientas de administración de seguridad de Internet, también llamadas IIS.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 15, text: "15. Linux es un sistema operativo de código libre basado en Unix. Sus diferentes versiones se denominan:", options: ["a) Instalaciones.", "b) Distribuciones.", "c) Licencias adaptadas.", "d) Variaciones permitidas.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 16, text: "16. En el ámbito de los lenguajes de programación, ¿a qué se llama recolección de basura (garbage collector) y en qué paradigma se utiliza?", options: ["a) En el paradigma orientado a objetos. La recolección de basura es la técnica por la cual el ambiente de objetos se encarga de destruir automáticamente y, por tanto, desasignar de la memoria a los que hayan quedado sin ninguna referencia a ellos.", "b) En la programación reactiva. La recolección de basura es la técnica por la cual el ambiente de grafos se encarga de destruir automáticamente y, por tanto, desasignar de la memoria a los que hayan quedado sin ninguna referencia a ellos.", "c) En la programación funcional. La recolección de basura es la técnica por la cual las funciones se encargan de destruir automáticamente y, por tanto, desasignar de la memoria a las que hayan quedado sin ninguna referencia a ellas.", "d) En el paradigma imperativo. La recolección de basura es la técnica por la cual los procedimientos se encargan de destruir automáticamente y, por tanto, desasignar de la memoria a los que hayan quedado sin ninguna referencia a ellos.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 17, text: "17. Refiriéndonos a una constante en un programa en lenguaje C, podemos afirmar que:", options: ["a) También es conocida como conversión o casting.", "b) Es una entidad cuyo valor no puede ser modificado por el programa.", "c) Pueden ser locales, globales, estáticas y externas.", "d) Se dividen en conversiones y ámbitos.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 18, text: "18. Las funciones de la capa de transporte son:", options: ["a) Cifrado y compresión de datos.", "b) Segmentación, confirmación y multiplexación.", "c) Control del dialogo y recuperación de errores.", "d) Direccionamiento, encaminamiento y control de tráfico.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 19, text: "19. En el modelo OSI la capa que se encarga, entre otras funciones, del control del diálogo (full-duplex o half-duplex) y de la recuperación ante errores es:", options: ["a) Sesión.", "b) Enlace a datos.", "c) Transporte.", "d) Presentación.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 20, text: "20. De los siguientes, ¿qué dispositivo trabaja en la capa dos del modelo OSI?", options: ["a) Firewall.", "b) Concentradores.", "c) Puentes.", "d) Repetidores.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 21, text: "21. De acuerdo con la guía BP/27 del CCN-CERT \"Recomendaciones de seguridad en Kubernetes\", ¿qué es un ETCD?", options: ["a) Es una clase de almacenamiento de datos no volátil, donde se almacena toda la información relevante a la configuración del clúster de Kubernetes.", "b) Se encarga de la interacción con los distintos usuarios del sistema a través de una interfaz de control de sistema, gestionando las peticiones al clúster de Kubernetes.", "c) Es donde se ordenan y planifican las prioridades en la gestión del clúster mediante el uso de APIs desde la línea de comandos.", "d) El encargado de realizar la revisión de los procesos independientes de los componentes del ecosistema de Kubernetes.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 22, text: "22. En un contexto de contenedores, ¿cuál de las siguientes herramientas es una plataforma de mensajería?", options: ["a) Podman.", "b) Rabbit MQ.", "c) Openshift.", "d) Kong.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 23, text: "23. ¿Qué protocolo se usa en las herramientas de monitorización para hacer consultas del estado de los activos?", options: ["a) NDMP (Network Data Management Protocol).", "b) SNMP (Simple Network Management Protocol).", "c) NMS (Network Management System).", "d) ONTP (Open Network Transaction Protocol).", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 24, text: "24. ¿Cuál de las siguientes afirmaciones con respecto al modelo de ciclo de vida \"Code and Fix\" es correcta?", options: ["a) Es un modelo básico compuesto por 3 fases, primero realizar el análisis y diseño del sistema, a continuación, codificar y, por último, resolver los problemas del código.", "b) Supone grandes costes de mantenimiento a largo plazo.", "c) Se realiza una toma de requisitos completa al comienzo del proyecto.", "d) Se realiza documentación de cada una de sus fases.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 25, text: "25. ¿Cuál es el orden de las fases definidas para el modelo de ciclo de vida en espiral?", options: ["a) Planificación, Evaluación, Análisis de riesgos e Ingeniería.", "b) Análisis de riesgos, Planificación, Ingeniería y Evaluación.", "c) Planificación, Análisis de riesgos, Ingeniería y Evaluación.", "d) Ingeniería, Planificación, Análisis de riesgos y Evaluación.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 26, text: "26. En el modelo de ciclo de vida en cascada pura, ¿qué sucede si la revisión del paso a la siguiente etapa del proyecto NO es satisfactoria?", options: ["a) Se continua con la etapa siguiente.", "b) Se retrocede a la etapa anterior.", "c) Se permanece en la etapa actual hasta que esté preparada.", "d) Se comienza otra vez con la primera etapa.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 27, text: "27. Indique cuál de las siguientes NO es una metodología ágil:", options: ["a) Scrum.", "b) Extreme Programing (XP).", "c) Métrica v3.", "d) Lean.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 28, text: "28. En la metodología Métrica v3, ¿qué tipos de pruebas se ejecutan durante el proceso de Construcción del Sistema de Información (CSI)?", options: ["a) Unitarias, de integración y de aceptación.", "b) Unitarias, de integración y de implantación.", "c) Unitarias, de integracion y del sistema.", "d) Unitarias, de integración y de regresión.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 29, text: "29. Indique cuál de estos enunciados es verdadero, referido a un Diagrama de Clases:", options: ["a) Es un diagrama que representa el comportamiento temporal de las clases.", "b) Las relaciones entre clases de tipo generalización/especialización se conocen como \"asociación\".", "c) Una relación de composición se representa con una línea discontinua con una flecha apuntando a la clase cuya instancia contiene las instancias de la otra clase.", "d) El diagrama puede incluir paquetes, donde cada uno de ellos agrupa un conjunto de clases.", "e) Dejar en blanco."], correctIndex: 3 },
            { id: 30, text: "30. Indique cuál de las siguientes NO es una técnica usada para recopilar información sobre el negocio del cliente o sobre los requerimientos funcionales del sistema a desarrollar:", options: ["a) Observación \"in situ\".", "b) Pruebas unitarias.", "c) Estudio de documentación.", "d) Entrevistas.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 31, text: "31. En una base de datos relacional, al conjunto de atributos que identifican unívoca y mínimamente cada tupla, en una relación, se le denomina:", options: ["a) Clave inherente.", "b) Clave candidata.", "c) Clave semántica.", "d) Clave obligatoria.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 32, text: "32. ¿Cuándo NO se recomiendan las técnicas de bases de datos relacionales?", options: ["a) Cuando se quiere flexibilidad de adaptación a cada problema.", "b) Cuando se quiere controlar la integridad de los datos.", "c) Cuando la información recogida se almacena como grafos o claves-valor.", "d) Cuando se quiere garantizar la consistencia de la información.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 33, text: "33. ¿Cuál de los siguientes NO es un tipo abstracto de datos?", options: ["a) Listas.", "b) Pilas.", "c) Colas.", "d) Bucles.", "e) Dejar en blanco."], correctIndex: 3 },
            { id: 34, text: "34. ¿Cuál de las siguientes NO es una herramienta para pruebas de software?", options: ["a) Cucumber.", "b) Jmeter.", "c) Juniper.", "d) Selenium.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 35, text: "35. Los estándares de documentación de software son un conjunto de directrices y mejores prácticas para crear y mantener documentación clara, coherente y útil para proyectos de software. ¿Cuál de los siguientes estándares forma parte de dicha categoría?", options: ["a) JavaNET.", "b) ISO 14000.", "c) StanDoc.", "d) Doxygen.", "e) Dejar en blanco."], correctIndex: 3 },
            { id: 36, text: "36. ¿Cuál de las siguientes opciones NO corresponde a una prueba de software de caja negra?", options: ["a) Pruebas de transición de estado.", "b) Análisis de valores límite.", "c) Pruebas de casos de uso.", "d) Cobertura de rutas.", "e) Dejar en blanco."], correctIndex: 3 },
            { id: 37, text: "37. ¿Qué es JUnit?", options: ["a) Un entorno para pruebas en la JVM.", "b) Un framewok para el desarrollo de aplicaciones en JScript.", "c) Un IDE para desarrollo de aplicaciones Java.", "d) Un servidor de aplicaciones que cumple la especificación Java EE.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 38, text: "38. Conforme a Métrica v3, indique quiénes son los participantes en la realización de las pruebas de aceptación:", options: ["a) El jefe de proyecto.", "b) Los usuarios expertos.", "c) El responsable de la implantación.", "d) Los directores de los usuarios.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 39, text: "39. ¿Cuál de las siguientes NO es una modalidad de migración de aplicaciones?", options: ["a) Refronting.", "b) Replacement.", "c) Reconsidering.", "d) Rehosting.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 40, text: "40. ¿Cuál de los siguientes grupos NO está contemplado como participante en las actividades del proceso Mantenimiento de Sistemas de Información (MSI), conforme a Métrica v3?", options: ["a) El equipo de mantenimiento.", "b) El jefe de proyecto.", "c) El equipo de análisis.", "d) El responsable de mantenimiento.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 41, text: "41. ¿Cuál de las siguientes relaciones NO se utilizan en el modelado del diagrama de clases de UML 2.5.1?", options: ["a) Asociación.", "b) Inclusión.", "c) Generalización.", "d) Agregación.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 42, text: "42. ¿Cuál de las siguientes opciones NO es una característica del diseño orientado a objetos?", options: ["a) Reusabilidad.", "b) Herencia.", "c) Cohesión débil.", "d) Polimorfismo.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 43, text: "43. ¿Cuál de las siguientes opciones NO es una herramienta utilizada para modelar diagramas UML?", options: ["a) Microsoft Visio.", "b) ModelDraw.", "c) Lucidchart.", "d) Gliffy.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 44, text: "44. ¿Cuál de las siguientes afirmaciones con respecto a la tecnología \"servlet\" es INCORRECTA?", options: ["a) Permite el uso de sesiones web aunque se desactive el mecanismo de cookies.", "b) Proporciona HTML dinámico mediante el uso de páginas interpretadas.", "c) Ofrece una API para la programación del modelo de petición/respuesta de la web.", "d) Para cada clase servlet se instancia, por defecto, un único objeto y las peticiones web que se reciben se ejecutan en hilos diferenciados.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 45, text: "45. ¿Cuál de los siguientes es un servidor de aplicaciones Java Enterprise Edition (JEE)?", options: ["a) Apache Tomcat.", "b) IBM WebSphere.", "c) Oracle Jdeveloper.", "d) Oracle Exadata.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 46, text: "46. ¿Cuál de los siguientes marcos de trabajo del entorno de .NET está concebido para el desarrollo de aplicaciones nativas en la nube?", options: ["a) .NET MAUI", "b) NET Aspire", "c) .NET Flow", "d) .NET Azure", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 47, text: "47. ¿Qué versión del lenguaje de programación C# incluye como predeterminada la plataforma.NET en su versión 9.x?", options: ["a) C# 13", "b) C# 12", "c) C# 11", "d) C# 10", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 48, text: "48. ¿Qué es Razor en ASP.NET Core?", options: ["a) Es un servicio de administración de datos que te permite catalogar, descubrir, compartir y gestionar los datos almacenados en Azure, fuentes locales y de terceros de forma más rápida y sencilla.", "b) Es una sintaxis de marcado para insertar código basado en .NET en páginas web.", "c) Es un servicio que puede ejecutar código sin aprovisionar ni administrar servidores.", "d) Es un servicio para entrenar e implementar modelos de machine learning (ML) para cualquier caso de uso con infraestructura, herrmientas y flujos de trabajo completamente administrados.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 49, text: "49. ¿Cuál de las siguientes especificaciones se utiliza para describir la interfaz de servicios web a través del lenguaje XML?", options: ["a) UDDI.", "b) HTML.", "c) SOAP.", "d) WSDL.", "e) Dejar en blanco."], correctIndex: 3 },
            { id: 50, text: "50. ¿Cuál de los siguientes es el token de seguridad definido en las especificaciones Web Services Security (WS-Security) para el uso de certificados X.509?", options: ["a) Username Token.", "b) Binary Security Token.", "c) Certificate Token.", "d) X.509 Certificate Token.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 51, text: "51. Respecto a la validación de datos de entrada mediante lenguajes de scripting en el navegador del usuario, ¿cuál de las siguientes afirmaciones es correcta?", options: ["a) Aumenta el número de llamadas necesarias al servidor.", "b) Garantiza un mayor nivel de seguridad al implementar las validaciones de datos exclusivamente en el navegador del usuario.", "c) No impide ataques de tipo Cross-Site Scripting (XSS).", "d) No es posible implementarla con código JavaScript en formularios HTML.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 52, text: "52. ¿Cuál de las siguientes opciones NO es una de las divisiones de la norma ISO/IEC 25000 del marco de trabajo común para evaluar la calidad del producto software?", options: ["a) División de Medición de Calidad.", "b) División de Mejora de Calidad.", "c) División de Gestión de Calidad.", "d) División de Evaluación de Calidad.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 53, text: "53. ¿Qué miden los puntos de función en un sistema de software?", options: ["a) El tamaño del sistema.", "b) El rendimiento del sistema.", "c) La seguridad del sistema.", "d) La fiabilidad del sistema.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 54, text: "54. La capacidad de un sitio web para ser utilizado por todas las personas, independientemente de sus habilidades o discapacidades, se denomina:", options: ["a) Accesibilidad.", "b) Usabilidad.", "c) Navegación intuitiva.", "d) Compatibilidad.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 55, text: "55. ¿Cuál de los siguientes elementos es fundamental para una buena experiencia de usuario (UX) en un sitio web?", options: ["a) Ofrecer una navegación clara e intuitiva.", "b) Utilizar animaciones complejas en todas las páginas.", "c) Diseño centrado en las tendencias actuales, sin considerar la funcionalidad.", "d) En los formularios, evitar el uso de mensajes de error para no confundir al usuario.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 56, text: "56. ¿Qué técnica de minería de datos se utiliza para predecir valores futuros cuyo resultado es un valor numérico o continuo?", options: ["a) Visualización.", "b) Clustering.", "c) Asociación.", "d) Regresión.", "e) Dejar en blanco."], correctIndex: 3 },
            { id: 57, text: "57. ¿Qué operación OLAP (OnLine Analytical Processing) permite reducir las dimensiones de un cubo?", options: ["a) Roll-up.", "b) Drill-down.", "c) Slice.", "d) Dice.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 58, text: "58. ¿Qué hace un JobTracker en Hadoop?", options: ["a) Ejecuta tareas individuales de MapReduce asignadas por el TaskTracker.", "b) Almacena los metadatos, como el árbol de directorios del sistema de ficheros (Espacio de Nombres), y sabe en qué nodo del cluster está cada bloque de información (Mapa de Bloques).", "c) Asigna trabajos de MapReduce a nodos específicos.", "d) Organiza todos los resultados parciales obtenidos por los mappers en cada instancia o nodo y los reduce al agrupar y sumar todas las ocurrencias de una aparición en concreto.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 59, text: "59. Si en el acceso a memoria de un sistema operativo se da un problema de paginación, el algoritmo que elige que la siguiente página a cargar sea la accedida con menor frecuencia es:", options: ["a) NRU", "b) LTU.", "c) NFU.", "d) LFU.", "e) Dejar en blanco."], correctIndex: 3 },
            { id: 60, text: "60. En el sentido más fundamental, cuando una aplicación necesita leer datos en un dispositivo llama a una función que le ofrece el sistema operativo, y el sistema operativo llama a una función implementada en el:", options: ["a) Microkernel.", "b) Módulo SVC.", "c) Controlador del bus.", "d) Controlador o driver.", "e) Dejar en blanco."], correctIndex: 3 },
            { id: 61, text: "61. ¿Qué es una clave foránea (foreign key) en una base de datos?", options: ["a) Un campo que almacena valores que no coinciden con los valores de la clave primaria de la tabla referenciada.", "b) Un campo que identifica de manera única cada registro en una tabla.", "c) Un campo que crea una relación entre dos tablas.", "d) Es un identificador único (normalmente una cadena alfanumérica) que señala la ubicación física de una fila en una tabla de una base de datos.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 62, text: "62. ¿Qué es un \"deadlock\" en el contexto de bases de datos?", options: ["a) La capacidad de una transacción para ejecutarse de manera independiente de otras transacciones.", "b) Un mecanismo para asegurar que múltiples transacciones se ejecuten de manera segura y sin conflictos.", "c) Una situación en la que dos o más transacciones se bloquean mutuamente esperando recursos.", "d) Un nivel de aislamiento que asegura que las transacciones se ejecuten de manera secuencial sin interferencias.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 63, text: "63. ¿Qué función tiene el archivo TNSNAMES.ORA en una base de datos Oracle?", options: ["a) Define los servicios de base de datos que el listener puede gestionar, permitiendo que los clientes se conecten a estos servicios.", "b) Permite a los clientes Oracle resolver el nombre del servicio a una dirección de red y otros parámetros necesarios para establecer una conexión con la base de datos.", "c) Define una serie de parámetros que controlan el comportamiento de la base de datos, como el tamaño de la memoria, los límites de procesos y sesiones, y las ubicaciones de los archivos de datos.", "d) Permite a los administradores personalizar el entorno de la base de datos según las necesidades específicas de la aplicación y el hardware.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 64, text: "64. Según Metrica v3, ¿cuál es el tipo de mantenimiento que se realiza después de la entrega del software para corregir errores que no fueron detectados durante el desarrollo?", options: ["a) Correctivo.", "b) Adaptativo.", "c) Perfectivo.", "d) Preventivo.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 65, text: "65. ¿Qué tipo de backup se realiza primero en un esquema de backup sintético completo?", options: ["a) Backup diferencial.", "b) Backup incremental.", "c) Backup completo tradicional.", "d) Backup incremental y de todos los diferenciales.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 66, text: "66. ¿Qué técnica se utiliza para priorizar las incidencias en función de su impacto y urgencia?", options: ["a) Análisis PESTEL.", "b) Matriz de prioridades.", "c) Método Pomodoro.", "d) Diagrama de Ishikawa.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 67, text: "67. El llamado conflicto de fusión (merge conflict) está relacionado con:", options: ["a) Un problema de compatibilidad entre diferentes versiones de un sistema operativo.", "b) Un problema de recuperación de una copia de seguridad, por la imposibilidad de fusionar al backup completo los backup diferenciales o incrementales.", "c) El control de versiones en el desarrollo software.", "d) Un problema de sincronización entre diferentes bases de datos.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 68, text: "68. ¿Qué es el \"jitter\" en la monitorización del rendimiento de redes?", options: ["a) La variación en el tiempo de llegada de paquetes de datos.", "b) La cantidad de datos que puede transmitir un sistema.", "c) El tiempo que tarda un sistema en responder a una solicitud.", "d) El porcentaje de uso de la CPU.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 69, text: "69. ¿Qué es un \"branch\" en un sistema de control de versiones?", options: ["a) Una copia exacta del repositorio principal.", "b) Una línea de desarrollo independiente.", "c) Un archivo de configuración.", "d) Una zona intermedia donde se colocan los cambios antes de hacer un commit.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 70, text: "70. Un sistema RAID-5 formado por 5 discos:", options: ["a) Muestra una tolerancia de fallo de 1 disco.", "b) Muestra una tolerancia de fallo de 2 discos.", "c) Muestra una tolerancia de fallo de 3 discos.", "d) La tolerancia de fallo dependerá de la casuística y de cómo se distribuyan los bloques de paridad.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 71, text: "71. En relación con los protocolos de almacenamiento de datos DAS, SAN y NAS, señale la opción correcta:", options: ["a) Son términos comerciales para referirnos a un SDS (Software Defined Storage).", "b) NAS se refiere a un protocolo de acceso a datos almacenados en equipos remotos, mientras SAN se refiere a una arquitectura completa de almacenamiento, definida desde la propia capa física.", "c) SAN, descrito en el RFC3723, es una extensión del protocolo NAS, descrito en el RFC2881.", "d) DAS y SAN son protocolos de acceso a datos almacenados en equipos remotos, mientras NAS se refiere a una arquitectura completa de almacenamiento, definida desde la propia capa física.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 72, text: "72. Acorde al IETF RFC 3720, el formato de un identificador IQN (ISCSI Qualified Name), siendo \"aaaa-mm\" el año y el mes de adquisición del dominio, es:", options: ["a) iqn.aaaa-mm.naming-authority:nombre-único", "b) eui.aaaa-mm.naming-authority:nombre-único", "c) iqn.naming-authority.aaaa-mm:nombre-único", "d) eui.naming-authority.aaaa-mm:nombre-único", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 73, text: "73. El protocolo LACP (Link Aggregation Control Protocol - IEEE 802.3ad):", options: ["a) Permite el establecimiento de redes lógicas Ethernet en infraestructuras Ethernet nativas para mantener dinámicamente la topología entre nodos.", "b) Se desarrolló para minimizar la posición dominante de las tarjetas de red de Cisco y compatibilizarlas con las de sus entonces rivales: Alcatel-Lucent, Aruba, IBM,...", "c) Permite combinar varias conexiones de red físicas en una sola conexión lógica para aumentar el rendimiento y proporcionar redundancia.", "d) Proporciona conmutación modo activo/pasivo en las conexiones de red físicas para ofertar alta disponibilidad.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 74, text: "74. Cuando decimos que un sistema tiene alta disponibilidad (HA), esto significa que:", options: ["a) Ha superado los test de accesibilidad, de manera que su usabilidad se ha comprobado válida para todos los tipos de usuario definidos.", "b) Son sistemas críticos a los que se les exige una replicación de sus centros de datos en diferentes lugares del mundo para asegurar un acceso rápido a los datos.", "c) Son sistemas críticos a los que se les exige una alta tasa de operatividad, determinada en su SLA (Service Level Agreement) y, por ello, disponen de las necesarias operaciones de mantenimiento y gestión para asegurar su disponibilidad.", "d) Son sistemas críticos que se encuentran siempre en un entorno cloud para estar permanentemente conectados a una red de comunicaciones.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 75, text: "75. ¿Cómo NO conseguiríamos atenuar una diafonía (crosstalk) en una transmisión por pares de cable?", options: ["a) Aumentando la torsión de los cables.", "b) Aumentando la frecuencia de la transmisión.", "c) Aumentando el blindaje de los cables.", "d) Aumentando la distancia entre pares.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 76, text: "76. ¿Cuál es el estándar de Wi-Fi 6?", options: ["a) IEEE 800.11g", "b) IEEE 802.11ac", "c) IEEE 802.11at", "d) IEEE 802.11ax", "e) Dejar en blanco."], correctIndex: 3 },
            { id: 77, text: "77. En relación al ámbito de la seguridad de la red de una organización, podríamos afirmar que:", options: ["a) IDS (Intrusion Detection System) es un servidor en la red que bloquea los accesos no autorizados.", "b) IPS (Intrusion Prevention System) es un software que se utiliza para un análisis forense de los ataques y accesos no autorizados.", "c) SIEM (Security Information and Event Management) es un software que engloba la gestión de información de seguridad y la gestión de eventos.", "d) IGS (Intrusion Gateway System) combina las tareas de un IDS y un IPS, proporcionando un análisis en tiempo real de las alertas de seguridad generadas por los distintos dispositivos hardware y software de la red.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 78, text: "78. Si tenemos una dirección IP, en formato CIDR, que es 128.100.15.10/22, podemos afirmar que tenemos:", options: ["a) 512 direcciones y una máscara 255.255.254.0", "b) 1024 direcciones y una máscara 255.255.252.0", "c) 2048 direcciones y una máscara 255.255.248.0", "d) 4096 direcciones y una máscara 255.255.240.0", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 79, text: "79. El protocolo HSRP (Hot Standby Router Protocol):", options: ["a) Es propietario de Alcatel-Lucent.", "b) Es propietario de Cisco.", "c) Es propietario de IBM.", "d) Es un estándar abierto.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 80, text: "80. ¿Cuál NO es un tipo de mensaje SNMP?", options: ["a) GET", "b) SET", "c) ACK", "d) TRAP", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 81, text: "81. LDIF es:", options: ["a) Un estándar para la representación del dato independientemente del sistema.", "b) Un estándar para el intercambio de información de un directorio LDAP.", "c) Una petición AJAX para actualizar los datos cargados en el servidor.", "d) Una función SQL para comparar dos valores de tipo fecha.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 82, text: "82. Las BER (Basic Encoding Rules):", options: ["a) Están definidas en el estándar ITU-T X.660", "b) Están definidas en el estándar ITU-T X.690", "c) Están definidas en el estándar ITU-T X.960", "d) Están definidas en el estándar ITU-T X.990", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 83, text: "83. En cuanto al protocolo de enrutamiento RIPv2, ¿cuál es el número de saltos para que una ruta a una red se considere inalcanzable?", options: ["a) 15 saltos.", "b) 7 saltos.", "c) 16 saltos.", "d) 8 saltos.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 84, text: "84. En una red MPLS (Multiprotocol Label Switching), ¿qué función realiza el elemento LDP (Label Distribution Protocol)?", options: ["a) Es el elemento que conmuta etiquetas.", "b) Es el elemento que inicia o termina el túnel (extrae e introduce cabeceras).", "c) Es el elemento que distribuye etiquetas entre los diferentes equipos de la red.", "d) Es el elemento que encamina el tráfico en función de las etiquetas.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 85, text: "85. Con respecto a la seguridad en las redes inalámbricas, ¿cuál de las siguientes afirmaciones es correcta?", options: ["a) En el protocolo WPA se pueden utilizar mecanismos de autenticación AES.", "b) TKIP es una técnica de autenticación segura contra servidores en WI-FI.", "c) EAP es uno de los algoritmos de encriptación que se pueden utilizar en el protocolo WPA2.", "d) El protocolo WPA2-Empresarial se basa en 802.5x y servidor de autenticación.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 86, text: "86. ¿Cuál de las siguientes afirmaciones sobre el protocolo 802.11 es correcta?", options: ["a) En DS (Distribution System), cada AP (Access Point) tendrá su propio dominio de difusión.", "b) El sistema WDS (Wireless Distribution System) no permite crear una red de distribución inalámbrica.", "c) En un ESS (Extended Service Set), los AP (Access Point) pueden utilizar diferentes canales para comunicarse entre si.", "d) Un AP (Access Point) que utiliza el protocolo 802.11ac puede permitir tráfico del protocolo 802.11b.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 87, text: "87. Al tipo de ataque que se caracteriza por el uso de múltiples dispositivos conectados a Internet para inundar un objetivo con tráfico de peticiones hasta comprometer la disponibilidad se le denomina:", options: ["a) Ataque de ransomware.", "b) Ataque DDoS.", "c) Ataque de phishing.", "d) Ataque de ingeniería social.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 88, text: "88. En relación a la seguridad informática, ¿qué es un \"honeypot\"?", options: ["a) Un tipo de firewall NGFW que incorpora IDS/IPS.", "b) Un señuelo para atraer y analizar ataques.", "c) Un sistema contra ataques ransomware.", "d) Una clase de protocolos de encriptación.", "e) Dejar en blanco."], correctIndex: 1 },
            { id: 89, text: "89. En criptografia, ¿qué es el \"hashing\"?", options: ["a) Un proceso para convertir datos en una cadena de longitud fija.", "b) Un método para encriptar datos.", "c) Un protocolo de comunicación seguro.", "d) Un tipo de ataque de red.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 90, text: "90. El conjunto básico de protocolos para la transmisión adecuada de cualquier tipo de datos en Internet es:", options: ["a) SMTP y FTP.", "b) HTTP y SMTP.", "c) HTTP, SMTP y FTP.", "d) TCP/IP.", "e) Dejar en blanco."], correctIndex: 3 },
            { id: 91, text: "91. En términos de direccionamiento, ¿cuál es la principal diferencia entre IPv4 e IPv6?", options: ["a) IPv4 utiliza direcciones de 32 bits, mientras que IPv6 utiliza direcciones de 256 bits.", "b) IPv4 utiliza direcciones de 256 bits, mientras que IPv6 utiliza direcciones de 32 bits.", "c) IPv4 utiliza direcciones de 32 bits, mientras que IPv6 utiliza direcciones de 128 bits.", "d) IPv4 utiliza direcciones de 32 bits, mientras que IPv6 utiliza direcciones de 64 bits.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 92, text: "92. En IoT (Internet of Things), el término que se utiliza para referirse a la comunicación entre los dispositivos definidos como objetos (things), es:", options: ["a) M2M.", "b) P2P.", "c) B2B.", "d) T2T.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 93, text: "93. VoIP son las siglas de una tecnología que significa:", options: ["a) Voice over IP, permite realizar conversaciones de voz a traves de redes IP.", "b) Video over IP, permite transmitir vídeo a traves de redes IP.", "c) Virtual over IP, permite la virtualizazion sobre redes IP.", "d) Visual over IP, permite visualizar vídeo a traves de redes IP.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 94, text: "94. En una red H.323 un \"gatekeeper\" es el elemento que realiza, principalmente, la siguiente función:", options: ["a) Controlar el acceso a la red.", "b) Interoperar con otras redes.", "c) Proporcionar servicios de vídeo a la red.", "d) Gestionar la seguridad de la red.", "e) Dejar en blanco."], correctIndex: 0 },
            { id: 95, text: "95. La caracteristica distintiva de la tecnología 4G de redes móviles frente a generaciones anteriores es:", options: ["a) Uso de señales analógicas.", "b) Introducción de SMS.", "c) Uso de GSM.", "d) Basada completamente en el protocolo IP.", "e) Dejar en blanco."], correctIndex: 3 },
            { id: 96, text: "96. La generación de tecnología móvil que introdujo el concepto de \"banda ancha móvil\" es:", options: ["a) 1G.", "b) 2G.", "c) 3G.", "d) 4G.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 97, text: "97. La característica de la tecnología 5G que permite la implementación de redes privadas y la segmentación de red (network slicing) es:", options: ["a) El uso de frecuencias más altas.", "b) Una arquitectura basada en software y virtualización.", "c) Un mayor ancho de banda.", "d) La compatibilidad con tecnologías anteriores.", "e) Dejar en blanco."], correctIndex: 1 },

            { id: 103, text: "Reserva 3. ¿Cuál de las siguientes opciones se incluye en el ámbito subjetivo de aplicación de la Ley 37/2007, de 16 de noviembre, sobre reutilización de la información del sector público?", options: ["a) Las sociedades mercantiles pertenecientes al sector privado que actúen como operadores de servicio público.", "b) Los organismos y entidades del sector público institucional creados para satisfacer necesidades de interés general, que tengan carácter industrial o mercantil.", "c) Las sociedades mercantiles pertenecientes al sector público institucional que actúen como armadores comunitarios que cumplen obligaciones de servicio público.", "d) Los organismos y entidades del sector público institucional creados para satisfacer necesidades de interés particular, que no tengan carácter industrial o mercantil.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 104, text: "Reserva 4. De acuerdo con la guía BP/27 del CCN-CERT \"Recomendaciones de seguridad en Kubernetes\", los \"espacios de nombres\" son la forma que se tiene de delimitar los recursos de Kubernetes, ¿cuál NO es uno de los espacios de nombres predeterminados?", options: ["a) Default. Son recursos de usuario.", "b) Kube-net. Tiene la competencia de verificar la ejecución de los pods, comunicándolo al plano de control.", "c) Kube-public. Empleado para etiquetar los recursos públicos.", "d) Kube-system. Usado para los componentes de Kubernetes.", "e) Dejar en blanco."], correctIndex: 2 },
            { id: 105, text: "Reserva 5. El aprendizaje profundo (deep learning) es una rama del aprendizaje automático que modela a alto nivel el mundo real mediante redes neuronales, aprendiendo de manera continua e iterativa de los resultados obtenidos en la aplicación de modelos de aprendizaje automático sin la necesidad de intervención humana. ¿Cuál de las siguientes NO es una biblioteca usada para operar con redes neuronales?", options: ["a) Keras.", "b) AutomaticDL.", "c) TensorFlow.", "d) PyTorch.", "e) Dejar en blanco."], correctIndex: 1 }
        ];

        const CACHE_KEY = 'quizState_A2_PI_2024';

        let state = {
            answers: {}, 
            timeRemaining: questionsData.length * 54, 
            isFinished: false,
            isPaused: false,
            highestQuestionAnswered: 0
        };

        let timerInterval = null;

        function init() {
            const totalQ = questionsData.length;
            document.getElementById('start-q-count').innerText = totalQ;
            
            const minutos = Math.ceil((totalQ * 54) / 60);
            document.getElementById('start-time-limit').innerText = minutos;

            const savedState = localStorage.getItem(CACHE_KEY);
            if (savedState) {
                state = JSON.parse(savedState);
                if (state.isFinished) {
                    showFinalModal();
                } else {
                    document.getElementById('modal-start').classList.add('hidden');
                    document.getElementById('header').classList.remove('hidden');
                    document.getElementById('main-container').classList.remove('hidden');
                    
                    const btnPause = document.getElementById('btn-pause');
                    if (state.isPaused) {
                        btnPause.innerText = "Reanudar";
                        document.getElementById('main-container').style.opacity = "0.2";
                        document.getElementById('main-container').style.pointerEvents = "none";
                    } else {
                        btnPause.innerText = "Pausar";
                        document.getElementById('main-container').style.opacity = "1";
                        document.getElementById('main-container').style.pointerEvents = "auto";
                        startTimer();
                    }
                    
                    updateHeader();
                    renderQuiz();
                }
            } else {
                renderQuiz();
            }
        }

        function saveState() {
            localStorage.setItem(CACHE_KEY, JSON.stringify(state));
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!state.isPaused && !state.isFinished) {
                    state.timeRemaining--;
                    updateHeader();
                    saveState();
                    if (state.timeRemaining <= 0) {
                        finishTest();
                    }
                }
            }, 1000);
        }

        function togglePause() {
            state.isPaused = !state.isPaused;
            const btn = document.getElementById('btn-pause');
            
            if (state.isPaused) {
                btn.innerText = "Reanudar";
                document.getElementById('main-container').style.opacity = "0.2";
                document.getElementById('main-container').style.pointerEvents = "none";
                clearInterval(timerInterval);
            } else {
                btn.innerText = "Pausar";
                document.getElementById('main-container').style.opacity = "1";
                document.getElementById('main-container').style.pointerEvents = "auto";
                startTimer();
            }
            saveState();
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function startTest() {
            document.getElementById('modal-start').classList.add('hidden');
            document.getElementById('header').classList.remove('hidden');
            document.getElementById('main-container').classList.remove('hidden');
            startTimer();
            updateHeader();
        }

        function renderQuiz(reviewMode = false) {
            const container = document.getElementById('main-container');
            container.innerHTML = '';

            let questionsToRender = [...questionsData];

            if (reviewMode) {
                questionsToRender.sort((a, b) => {
                    const ansA = state.answers[a.id];
                    const ansB = state.answers[b.id];
                    const isCorrectA = ansA !== undefined && ansA === a.correctIndex;
                    const isCorrectB = ansB !== undefined && ansB === b.correctIndex;
                    return (isCorrectA === isCorrectB) ? 0 : isCorrectA ? 1 : -1;
                });
            }

            questionsToRender.forEach((q) => {
                const isAnswered = state.answers[q.id] !== undefined;
                const selectedOption = state.answers[q.id];
                const isBlank = selectedOption === 4;
                const isCorrect = selectedOption === q.correctIndex;

                let html = `<div class="question-card" id="q-${q.id}">
                                <div class="question-title">${q.text}</div>`;
                
                q.options.forEach((opt, optIndex) => {
                    let classes = "option";
                    if (isAnswered) {
                        classes += " disabled";
                        if (optIndex === q.correctIndex) classes += " correct";
                        if (optIndex === selectedOption && !isCorrect && !isBlank) classes += " wrong";
                        if (optIndex === selectedOption && isBlank) classes += " blank";
                    }

                    html += `<div class="${classes}" ${!isAnswered ? `onclick="selectOption(${q.id}, ${optIndex})"` : ''}>
                                ${opt}
                             </div>`;
                });

                if (isAnswered) {
                    let feedbackClass = isCorrect ? "feedback-correct" : "feedback-wrong";
                    let feedbackText = isCorrect ? "¡Respuesta correcta!" : 
                                      (isBlank ? "Dejada en blanco." : "Respuesta incorrecta.");
                    if (!isCorrect) {
                        feedbackText += `<br>La respuesta correcta es: <strong>${q.options[q.correctIndex]}</strong>`;
                    }
                    html += `<div class="feedback show ${feedbackClass}">${feedbackText}</div>`;
                }

                html += `</div>`;
                container.innerHTML += html;
            });
        }

        function selectOption(questionId, optionIndex) {
            if (state.isFinished || state.answers[questionId] !== undefined) return;
            
            state.answers[questionId] = optionIndex;
            
            if (questionId > state.highestQuestionAnswered) {
                state.highestQuestionAnswered = questionId;
            }

            saveState();
            updateHeader();
            renderQuiz();

            if (Object.keys(state.answers).length === questionsData.length) {
                setTimeout(finishTest, 1000);
            }
        }

        function updateHeader() {
            let correct = 0, wrong = 0, blank = 0;
            const total = questionsData.length;
            const answeredCount = Object.keys(state.answers).length;

            for (const qId in state.answers) {
                const q = questionsData.find(x => x.id == qId);
                const ans = state.answers[qId];
                if (ans === 4) {
                    blank++;
                } else if (ans === q.correctIndex) {
                    correct++;
                } else {
                    wrong++;
                }
            }

            const pending = total - answeredCount;
            
            let score = 0;
            if (state.highestQuestionAnswered > 0) {
                score = ((correct - (wrong / 3)) / state.highestQuestionAnswered) * 100;
            }
            score = Math.max(0, score);

            const notaColor = score >= 30 ? '#2ecc71' : '#e74c3c'; 
            const timerColor = state.timeRemaining < 300 ? '#e74c3c' : '#f39c12';

            document.getElementById('stat-correct').innerHTML = `Acertadas: <span style="color: #2ecc71;">${correct}</span>`;
            document.getElementById('stat-wrong').innerHTML = `Falladas: <span style="color: #e74c3c;">${wrong}</span>`;
            document.getElementById('stat-blank').innerText = `En blanco: ${blank}`;
            document.getElementById('stat-score').innerHTML = `Nota: <span style="color: ${notaColor};">${score.toFixed(2)}</span>`;
            document.getElementById('stat-pending').innerText = `Pendientes: ${pending}`;
            
            document.getElementById('stat-timer').innerHTML = `<span style="color: ${timerColor};">⏱</span> ${formatTime(state.timeRemaining)}`;

            return { correct, wrong, blank, score };
        }

        function finishTest() {
            state.isFinished = true;
            clearInterval(timerInterval);
            
            questionsData.forEach(q => {
                if (state.answers[q.id] === undefined) {
                    state.answers[q.id] = 4;
                    if (q.id > state.highestQuestionAnswered) {
                        state.highestQuestionAnswered = q.id;
                    }
                }
            });

            saveState();
            showFinalModal();
        }

        function showFinalModal() {
            const stats = updateHeader();
            localStorage.setItem('score_test-a2-pi-2024', stats.score.toFixed(2));
            const modal = document.getElementById('modal-end');
            const statusEl = document.getElementById('final-status');
            const scoreEl = document.getElementById('final-score');
            
            modal.classList.remove('hidden');
            
            if (stats.score >= 30) {
                statusEl.innerText = "¡APROBADO!";
                statusEl.style.color = "#27ae60";
            } else {
                statusEl.innerText = "SUSPENSO";
                statusEl.style.color = "#c0392b";
            }
            
            scoreEl.innerText = stats.score.toFixed(2);
            document.getElementById('final-stats').innerHTML = 
                `Acertadas: ${stats.correct} | Falladas: ${stats.wrong} | En blanco: ${stats.blank}`;
        }

        function resetTest() {
            if (confirm("¿Seguro que quieres reiniciar? Se perderá todo el progreso.")) {
                localStorage.removeItem(CACHE_KEY);
                localStorage.removeItem('score_test-a2-pi-2024');
                state = {
                    answers: {}, 
                    timeRemaining: questionsData.length * 54,
                    isFinished: false,
                    isPaused: false,
                    highestQuestionAnswered: 0
                };
                
                if (timerInterval) clearInterval(timerInterval);
                
                document.getElementById('modal-end').classList.add('hidden');
                document.getElementById('header').classList.add('hidden');
                document.getElementById('main-container').classList.add('hidden');
                document.getElementById('modal-start').classList.remove('hidden');
                
                document.getElementById('btn-pause').innerText = "Pausar";
                document.getElementById('main-container').style.opacity = "1";
                document.getElementById('main-container').style.pointerEvents = "auto";
                document.getElementById('btn-pause').style.display = 'inline-block';
                document.getElementById('btn-finish').style.display = 'inline-block';
                
                updateHeader();
                renderQuiz();
            }
        }

        function reviewAnswers() {
            document.getElementById('modal-end').classList.add('hidden');
            document.getElementById('header').classList.remove('hidden');
            
            document.querySelector('.controls').style.display = 'grid'; 
            
            document.getElementById('btn-pause').style.display = 'none';
            document.getElementById('btn-finish').style.display = 'none';
            
            renderQuiz(true);
        }

        window.onload = init;
    </script>
</body>
